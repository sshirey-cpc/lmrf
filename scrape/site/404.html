<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Lower Mississippi River Foundation</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .error-page p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      max-width: 500px;
    }
    .error-page a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #2a5c3f;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
    .error-page a:hover {
      background: #1e4430;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <h1>Page Not Found</h1>
    <p>Sorry, we couldn't find the page you were looking for. It may have been moved or no longer exists.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
