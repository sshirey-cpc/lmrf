server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Squarespace original paths -> static HTML files
    location = /new-page-2 { try_files /river-stewards.html =404; }
    location = /new-page-2/ { try_files /river-stewards.html =404; }
    location = /volunteer-1 { try_files /volunteer.html =404; }
    location = /volunteer-1/ { try_files /volunteer.html =404; }
    location = /lmrf { try_files /blog.html =404; }
    location = /lmrf/ { try_files /blog.html =404; }
    location = /our-programs { try_files /our-programs.html =404; }
    location = /our-programs/ { try_files /our-programs.html =404; }
    location = /who-we-are { try_files /who-we-are.html =404; }
    location = /who-we-are/ { try_files /who-we-are.html =404; }
    location = /summer-camps { try_files /summer-camps.html =404; }
    location = /summer-camps/ { try_files /summer-camps.html =404; }
    location = /get-involved { try_files /get-involved.html =404; }
    location = /get-involved/ { try_files /get-involved.html =404; }
    location = /calendar { try_files /calendar.html =404; }
    location = /calendar/ { try_files /calendar.html =404; }
    location = /contact { try_files /contact.html =404; }
    location = /contact/ { try_files /contact.html =404; }
    location = /donate { try_files /donate.html =404; }
    location = /donate/ { try_files /donate.html =404; }
    location = /camp-application { try_files /camp-application.html =404; }
    location = /camp-application/ { try_files /camp-application.html =404; }
    location = /delta-day-camp { try_files /delta-day-camp.html =404; }
    location = /delta-day-camp/ { try_files /delta-day-camp.html =404; }
    location = /advocate { try_files /advocate.html =404; }
    location = /advocate/ { try_files /advocate.html =404; }
    location = /home-1 { try_files /our-programs.html =404; }
    location = /home-1/ { try_files /our-programs.html =404; }

    # Blog posts serve index.html from subdirectories
    location /lmrf/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Default
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache images/fonts for 7 days
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # CSS/JS: short cache, must revalidate so changes show up quickly
    location ~* \.(css|js)$ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate";
    }

    # HTML: no cache, always fetch fresh
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Health check for Cloud Run / LB
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
