",name:"Pogo Producing Co., E-3 Boat Landing Pogo",lng:-89.32611,lat:29.26121,type:"access_point",slug:"mile-8-9-pogo-producing-co-e3"},{mile:6.9,bank:"RBD",name:"Un-Named Pass 6.7 - 1.5 Pilottown Anchorage",lng:-89.30801,lat:29.24081,type:"town",slug:"mile-6-9-unnamed-pass-67-15"},{mile:6.2,bank:"LBD",name:"Weber Marine, Sunshine Bridge Dry Bulk Transfer",lng:-89.29231,lat:29.22911,type:"bridge",slug:"mile-6-2-weber-marine-sunshine-bridge"},{mile:5.5,bank:"RBD",name:"Mouth of Southeast Pass Southeast Pass splinters",lng:-89.29831,lat:29.22911,type:"confluence",slug:"mile-5-5-mouth-of-southeast-pass"},{mile:4.9,bank:"LBD",name:"Mary Bower’s Pass",lng:-89.28411,lat:29.21651,type:"confluence",slug:"mile-4-9-mary-bowers-pass"},{mile:4.8,bank:"RBD",name:"New Pass",lng:-89.29011,lat:29.21651,type:"confluence",slug:"mile-4-8-new-pass"},{mile:4.5,bank:"LBD",name:"Burrwood Bayou (Top Entrance) Alternate route to",lng:-89.27631,lat:29.20381,type:"confluence",slug:"mile-4-5-burrwood-bayou-top-entrance"},{mile:3.4,bank:"LBD",name:"Picnic/Camping Spot",lng:-89.26841,lat:29.19101,type:"camping",slug:"mile-3-4-picniccamping-spot"},{mile:2.9,bank:"LBD",name:"Cubit’s Gap Many enticing routes",lng:-89.26841,lat:29.19101,type:"other",slug:"mile-2-9-cubits-gap-many-enticing"},{mile:2.5,bank:"RBD",name:"Fimbel Pass Fimbel Pass",lng:-89.26691,lat:29.17791,type:"confluence",slug:"mile-2-5-fimbel-pass-fimbel-pass-2"},{mile:2.4,bank:"LBD",name:"Shell Pipeline Co., Pilottown Wharf",lng:-89.26091,lat:29.17791,type:"town",slug:"mile-2-4-shell-pipeline-co-pilottown"},{mile:1.9,bank:"LBD",name:"Associated Branch Pilots and Crescent River Port",lng:-89.26091,lat:29.17791,type:"confluence",slug:"mile-1-9-associated-branch-pilots-and"},{mile:1.5,bank:"RBD",name:"Lower Shallow Island",lng:-89.26691,lat:29.17791,type:"camping",slug:"mile-1-5-lower-shallow-island"},{mile:0.5,bank:"RBD",name:"Upper Shallow Island",lng:-89.25881,lat:29.15061,type:"camping",slug:"mile-0-5-upper-shallow-island"}];
const typeColors={access_point:'#2ecc71',camping:'#e67e22',hazard:'#e74c3c',bridge:'#3498db',town:'#9b59b6',confluence:'#3498db',other:'#7f8c8d'};
const riverCoords=[[-89.60353676898701,29.44453233833258],[-89.52825101138718,29.362639588877492],[-89.45167619111756,29.362729991693662],[-89.35811089607556,29.287392310820792],[-89.28009653813953,29.204079495009786]];
const map=new mapboxgl.Map({container:'map',style:'mapbox://styles/mapbox/outdoors-v12',center:[-89.35, 29.15],zoom:10});
map.addControl(new mapboxgl.NavigationControl(),'top-right');
function addRiverLine(){if(map.getSource('river'))return;map.addSource('river',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:riverCoords}}});map.addLayer({id:'river-glow',type:'line',source:'river',paint:{'line-color':'#1B4965','line-width':6,'line-opacity':0.3,'line-blur':2}});map.addLayer({id:'river-line',type:'line',source:'river',paint:{'line-color':'#1B4965','line-width':3,'line-opacity':0.8}})}
const markerEls={},mapMarkers={};
function highlightMarker(mile){document.querySelectorAll('.chapter-card.highlighted').forEach(el=>el.classList.remove('highlighted'));const card=document.getElementById('card-'+mile);if(card){card.classList.add('highlighted');const list=document.getElementById('marker-list');const cardTop=card.offsetTop-list.offsetTop;list.scrollTo({top:cardTop-list.clientHeight/3,behavior:'smooth'})}Object.keys(markerEls).forEach(k=>{const el=markerEls[k];if(k==mile){el.style.width='18px';el.style.height='18px';el.style.border='3px solid #1B4965'}else{el.style.width='12px';el.style.height='12px';el.style.border='2px solid white'}})}
function addMarkers(){const list=document.getElementById('marker-list');list.innerHTML='';markers.forEach(m=>{const color=typeColors[m.type]||'#7f8c8d';const el=document.createElement('div');el.style.cssText='background:'+color+';width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:pointer;transition:all 0.2s;';markerEls[m.mile]=el;const popup=new mapboxgl.Popup({offset:10}).setHTML('<div class="popup-title">Mile '+m.mile+' '+m.bank+'</div><div class="popup-detail">'+m.name+'</div><a class="popup-link" href="http://35.188.103.101/'+m.slug+'/">Read guide &rarr;</a>');const marker=new mapboxgl.Marker(el).setLngLat([m.lng,m.lat]).setPopup(popup).addTo(map);mapMarkers[m.mile]=marker;el.addEventListener('click',()=>highlightMarker(m.mile));const card=document.createElement('div');card.className='chapter-card';card.id='card-'+m.mile;card.style.cursor='pointer';card.innerHTML='<div class="chapter-type" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;">Mile '+m.mile+' '+m.bank+'</div><h3>'+m.name+'</h3><a href="http://35.188.103.101/'+m.slug+'/" style="font-size:12px;color:#1B4965;font-weight:600;text-decoration:none;" onclick="event.stopPropagation()">Read guide &rarr;</a>';card.addEventListener('click',()=>{map.flyTo({center:[m.lng,m.lat],zoom:12,duration:1200});Object.values(mapMarkers).forEach(mk=>{if(mk.getPopup().isOpen())mk.togglePopup()});marker.togglePopup();highlightMarker(m.mile)});list.appendChild(card)})}
map.on('load',()=>{addRiverLine();addMarkers()});
document.getElementById('btn-terrain').onclick=()=>{map.setStyle('mapbox://styles/mapbox/outdoors-v12');setActive('btn-terrain');map.once('style.load',()=>{addRiverLine();addMarkers()})};
document.getElementById('btn-satellite').onclick=()=>{map.setStyle('mapbox://styles/mapbox/satellite-streets-v12');setActive('btn-satellite');map.once('style.load',()=>{addRiverLine();addMarkers()})};
function setActive(id){document.querySelectorAll('.map-style-toggle button').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active')}
